<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wake Up — Panel Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --cyan: #5DB4C9; --pink: #F11D8C; --green: #199432;
    --black: #080808; --surface: #111113; --card: #18181b;
    --border: #252528; --text: #f0f0f0; --muted: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 380px; text-align: center; }
  .login-logo { width: 72px; height: 72px; margin: 0 auto 20px; }
  .login-logo svg { width: 100%; height: 100%; }
  .login-box h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .login-box p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .login-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 13px 16px; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
  .login-box input:focus { border-color: var(--cyan); }
  .login-btn { width: 100%; background: var(--pink); border: none; border-radius: 10px; color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; padding: 13px; cursor: pointer; transition: opacity 0.15s; }
  .login-btn:hover { opacity: 0.9; }
  .login-error { display: none; color: var(--pink); font-size: 13px; margin-top: 12px; }

  /* ADMIN */
  #adminScreen { display: none; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .topbar-logo { width: 38px; height: 38px; }
  .topbar-logo svg { width: 100%; height: 100%; }
  .topbar h1 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: #fff; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .logout-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 14px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .logout-btn:hover { border-color: var(--pink); color: var(--pink); }
  .main { padding: 28px; max-width: 1200px; margin: 0 auto; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: #fff; }
  .stat-value.cyan { color: var(--cyan); } .stat-value.pink { color: var(--pink); } .stat-value.green { color: var(--green); }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .controls select, .controls input { background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 14px; outline: none; appearance: none; -webkit-appearance: none; transition: border-color 0.2s; }
  .controls select:focus, .controls input:focus { border-color: var(--cyan); }
  .controls input { min-width: 200px; } .controls input::placeholder { color: #444; }
  .export-btn { background: var(--cyan); border: none; border-radius: 10px; color: #fff; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; padding: 10px 20px; cursor: pointer; margin-left: auto; transition: opacity 0.15s; white-space: nowrap; }
  .export-btn:hover { opacity: 0.9; } .export-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Table */
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface); }
  th { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #1a1a1d; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .student-photo { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .no-photo { width: 44px; height: 44px; border-radius: 50%; background: var(--surface); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; background: rgba(93,180,201,0.12); color: var(--cyan); }
  .check-done { color: var(--green); font-size: 18px; } .check-pending { color: #333; font-size: 18px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  @media (max-width: 700px) { .main { padding: 16px; } .topbar { padding: 12px 16px; } }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://mzousqdahqterfawhwsz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16b3VzcWRhaHF0ZXJmYXdod3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTc4MzUsImV4cCI6MjA5NjA5MzgzNX0.EdSlcRdLD75OdYlwtZGLVgL_PGpJysWb_MKvuwGgj5Y';
  const PASSWORD = 'Wakeupadmin26!';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let allAlumnos = [];

  function doLogin() {
    if (document.getElementById('passwordInput').value === PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadAlumnos();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function doLogout() {
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
  }

  async function loadAlumnos() {
    const { data, error } = await db.from('alumnos').select('*').order('apellido', { ascending: true });
    document.getElementById('loadingState').style.display = 'none';
    if (error || !data) { document.getElementById('emptyState').style.display = 'block'; return; }
    allAlumnos = data;
    updateStats();
    renderTable();
    document.getElementById('alumnosTable').style.display = 'table';
  }

  function updateStats() {
    const total = allAlumnos.length;
    const conFoto = allAlumnos.filter(a => a.foto_url).length;
    const revisados = allAlumnos.filter(a => a.check_completado).length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statFotos').textContent = conFoto;
    document.getElementById('statPendientes').textContent = total - revisados;
    document.getElementById('statRevisados').textContent = revisados;
    document.getElementById('totalBadge').textContent = total + ' alumnos';
  }

  function getFiltered() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const colegio = document.getElementById('colegioFilter').value;
    return allAlumnos.filter(a => {
      const matchSearch = !search || (a.nombre||'').toLowerCase().includes(search) || (a.apellido||'').toLowerCase().includes(search);
      const matchColegio = !colegio || a.colegio === colegio;
      return matchSearch && matchColegio;
    });
  }

  function renderTable() {
    const filtered = getFiltered();
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');
    const table = document.getElementById('alumnosTable');
    if (filtered.length === 0) { table.style.display = 'none'; empty.style.display = 'block'; return; }
    table.style.display = 'table'; empty.style.display = 'none';
    tbody.innerHTML = filtered.map(a => `
      <tr>
        <td>${a.foto_url ? `<img class="student-photo" src="${a.foto_url}" alt="${a.nombre}">` : `<div class="no-photo">👤</div>`}</td>
        <td><strong>${a.apellido||'—'}</strong></td>
        <td>${a.nombre||'—'}</td>
        <td style="color:var(--muted)">${a.apodo||'—'}</td>
        <td><span class="badge">${a.colegio||'—'}</span></td>
        <td>${a.edad||'—'}</td>
        <td style="color:var(--muted);font-size:13px">${a.playlist||'—'}</td>
        <td><span class="${a.check_completado?'check-done':'check-pending'}" style="cursor:pointer" title="Click para cambiar" onclick="toggleCheck('${a.id}',${a.check_completado})">${a.check_completado?'✓':'○'}</span></td>
      </tr>`).join('');
  }

  async function toggleCheck(id, current) {
    const { error } = await db.from('alumnos').update({ check_completado: !current }).eq('id', id);
    if (!error) { const a = allAlumnos.find(x => x.id === id); if (a) a.check_completado = !current; updateStats(); renderTable(); }
  }

  async function imgToArrayBuffer(url) {
    try {
      const res = await fetch(url);
      return await res.arrayBuffer();
    } catch { return null; }
  }

  async function exportDocx() {
    const btn = document.getElementById('exportBtn');
    btn.disabled = true;
    btn.textContent = 'Cargando librería...';

    try {
      // Dynamically load docx + FileSaver
      await loadScript('https://cdn.jsdelivr.net/npm/docx@9.5.0/dist/index.umd.cjs');
      await loadScript('https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js');

      const filtered = getFiltered();
      const today = new Date().toLocaleDateString('es-AR');

      // Fetch all images
      const imgMap = {};
      for (let i = 0; i < filtered.length; i++) {
        const a = filtered[i];
        if (a.foto_url) {
          btn.textContent = `Cargando fotos... ${i + 1}/${filtered.length}`;
          imgMap[a.id] = await imgToArrayBuffer(a.foto_url);
        }
      }

      btn.textContent = 'Generando archivo...';

      const {
        Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
        ImageRun, AlignmentType, WidthType, BorderStyle, VerticalAlign, ShadingType
      } = window.docx;

      const grayBorder = { style: BorderStyle.SINGLE, size: 1, color: "CCCCCC" };
      const borders = { top: grayBorder, bottom: grayBorder, left: grayBorder, right: grayBorder };
      const cyanBorder = { style: BorderStyle.SINGLE, size: 4, color: "5DB4C9" };
      const hBorders = { top: cyanBorder, bottom: cyanBorder, left: cyanBorder, right: cyanBorder };

      const colWidths = [1900, 1900, 1600, 2000, 1600]; // sum = 9000

      const headerRow = new TableRow({
        tableHeader: true,
        children: ['Apellido', 'Nombre', 'Apodo', 'Colegio', 'Foto'].map((text, i) =>
          new TableCell({
            borders: hBorders,
            shading: { fill: "0a0a0a", type: ShadingType.CLEAR },
            width: { size: colWidths[i], type: WidthType.DXA },
            margins: { top: 100, bottom: 100, left: 120, right: 120 },
            verticalAlign: VerticalAlign.CENTER,
            children: [new Paragraph({
              children: [new TextRun({ text, bold: true, size: 20, font: "Arial", color: "5DB4C9" })]
            })]
          })
        )
      });

      const dataRows = await Promise.all(filtered.map(async (a) => {
        const buf = imgMap[a.id];
        const photoCell = buf
          ? new TableCell({
              borders,
              width: { size: colWidths[4], type: WidthType.DXA },
              margins: { top: 60, bottom: 60, left: 60, right: 60 },
              verticalAlign: VerticalAlign.CENTER,
              children: [new Paragraph({
                alignment: AlignmentType.CENTER,
                children: [new ImageRun({
                  data: buf,
                  type: 'jpeg',
                  transformation: { width: 75, height: 75 }
                })]
              })]
            })
          : new TableCell({
              borders,
              width: { size: colWidths[4], type: WidthType.DXA },
              margins: { top: 100, bottom: 100, left: 120, right: 120 },
              children: [new Paragraph({ children: [new TextRun({ text: '—', size: 18, font: "Arial" })] })]
            });

        const mkCell = (text, idx) => new TableCell({
          borders,
          width: { size: colWidths[idx], type: WidthType.DXA },
          margins: { top: 100, bottom: 100, left: 120, right: 120 },
          verticalAlign: VerticalAlign.CENTER,
          children: [new Paragraph({
            children: [new TextRun({ text: text || '—', size: 18, font: "Arial" })]
          })]
        });

        return new TableRow({
          children: [
            mkCell(a.apellido, 0),
            mkCell(a.nombre, 1),
            mkCell(a.apodo, 2),
            mkCell(a.colegio, 3),
            photoCell
          ]
        });
      }));

      const doc = new Document({
        sections: [{
          properties: {
            page: {
              size: { width: 12240, height: 15840 },
              margin: { top: 1080, right: 900, bottom: 1080, left: 900 }
            }
          },
          children: [
            new Paragraph({
              alignment: AlignmentType.LEFT,
              spacing: { after: 160 },
              children: [new TextRun({ text: 'Wake Up Viajes — Fichas de alumnos', bold: true, size: 28, font: "Arial" })]
            }),
            new Paragraph({
              alignment: AlignmentType.LEFT,
              spacing: { after: 360 },
              children: [new TextRun({ text: `Exportado el ${today} · ${filtered.length} alumnos`, size: 18, font: "Arial", color: "888888" })]
            }),
            new Table({
              width: { size: 9000, type: WidthType.DXA },
              columnWidths: colWidths,
              rows: [headerRow, ...dataRows]
            })
          ]
        }]
      });

      const blob = await Packer.toBlob(doc);
      saveAs(blob, `wakeup-fichas-${today.replace(/\//g, '-')}.docx`);

    } catch(err) {
      console.error(err);
      alert('Error al generar el archivo: ' + err.message);
    }

    btn.disabled = false;
    btn.textContent = '⬇ Exportar .docx';
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) return resolve();
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }
</script>
</body>
</html>
